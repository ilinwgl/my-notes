site_name: Develop Notes

markdown_extensions:
  - pymdownx.arithmatex:
      generic: true

extra_javascript:
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

theme: 
  name: material

plugins:
  - search
  - i18n:
      languages:
        - locale: en
          name: English
          default: true
        - locale: zh
          name: 简体中文
          build: true

nav:
  - Home: index.md
  - Computer Vision:
    - Overview: vision/index.md
    - Filter: vision/filter.md
    - Edge Detection: vision/edge_detection.md
    - Fitting: vision/fitting.md
  - .NET Development:
    - Overview: dotnet/index.md