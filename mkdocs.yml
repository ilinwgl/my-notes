site_name: Develop Notes

markdown_extensions:
  - pymdownx.arithmatex:
      generic: true

extra_javascript:
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

theme: 
  name: material

plugins:
  - i18n:
    default_language: en
    languages:
      zh:
        name: 简体中文
      en:
        name: English

nav:
  - Home: index.md
  - Computer Vision:
    - Overview: vision/index.md
    - Filter: vision/filter.md
  - .NET Development:
    - Overview: dotnet/index.md